<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lens Rentals</title>
     <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
        integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous" />
    <script src="script.js"></script>
</head>
<body>
      <nav>
    <figure>
           <img id="logo" src="./Assests/Lens rentals (1).png" alt="lens__logo" class="nav__logo">
           <div class="nav__logo--title">Lakeshore Lens Co.</div>
            </figure>
           <ul class="nav__link--list">
            <li class="nav__link">
                <a href="#" class="nav__link--anchor
                link__hover-effect
                link__hover-effect--black
                ">Home</a>
            <li class="nav__link">
                <a href="#" class="nav__link--anchor
                link__hover-effect
                link__hover-effect--black
                ">Find Your Lens</a>
            <li class="nav__link nav__link--primary">
                <a href="#" class="nav__link--anchor
                link__hover-effect
                link__hover-effect--black
                ">Contact</a>
            </li>
        </ul>
        </nav>
  <header>
    <div class="container">
        <div class="row">
            <div class="header__description">
                <h1>West Michigan's Premier Lens Rental</h1>
                <p class="header__description__para">
                    Rent any lens for any occasion! 
                </p>
                </div>
         </div>
           <form action="/search-results" method="GET" class="search-container">
    <input type="text" name="query" placeholder="Search by Price or Brand" aria-label="Search">
    <button type="submit" class="search-btn" aria-label="Submit Search">
        <img src="./Assests/camera-regular-full.svg" alt="search-btn">
    </button>
      </form>
    </header>
    <section>
        <figure>
            <img src="./Assests/BEST-SONY-E-MOUNT-LENSES-SUB-0814-2x1-1.webp"  class="sony__img" alt="sony__img" width="1000" height="500">
        </figure>
    </section>
    <footer>
       <div class="container">
        <div class="row footer__row">
            <figure>
             <img id="logo" src="./Assests/Lens rentals (1).png" alt="lens__logo" class="footer__logo">
            </figure>
            <div class="footer__social--list">
                <a href="#
                footer__social__link
                link__hover--effect
                link__hover-effect--white
                ">Home</a>
            <div class="footer__social--list">
                <a href="#
                footer__social__link
                link__hover--effect
                link__hover-effect--white
                ">Find Your Lens</a>
            <div class="footer__social--list">
                <a href="#
                footer__social__link
                link__hover--effect
                link__hover-effect--white
                ">Contact</a>
            </div>
        </div>
       </div>
    </footer>
